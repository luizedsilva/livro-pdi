<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .axis {
      stroke: #000;
      stroke-width: 1.5;
    }
    .tick {
      stroke: #000;
      stroke-width: 1;
    }
    .signal {
      fill: none;
      stroke: #777;
      stroke-width: 2;
    }
    .sample {
      fill: none;
      stroke: #000;
      stroke-width: 1.2;
    }
    .quant {
      stroke: #000;
      stroke-width: 0.8;
    }
    .label {
      font-family: system-ui, -apple-system, "Segoe UI",
                   "Latin Modern Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
    }
    .title {
      font-family: system-ui, -apple-system, "Segoe UI",
                   "Latin Modern Sans", Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
    }
  </style>

  <!-- Títulos -->
  <text class="title" x="60" y="40">A</text>
  <text class="title" x="760" y="40">B</text>

  <!-- ================== ÁREA A: AMOSTRAGEM ================== -->
  <!-- Eixos -->
  <line class="axis" x1="60" y1="320" x2="660" y2="320"/>
  <line class="axis" x1="60" y1="80" x2="60" y2="320"/>

  <!-- Ticks eixo x -->
  <g>
    <line class="tick" x1="100" y1="320" x2="100" y2="330"/>
    <line class="tick" x1="160" y1="320" x2="160" y2="330"/>
    <line class="tick" x1="220" y1="320" x2="220" y2="330"/>
    <line class="tick" x1="280" y1="320" x2="280" y2="330"/>
    <line class="tick" x1="340" y1="320" x2="340" y2="330"/>
    <line class="tick" x1="400" y1="320" x2="400" y2="330"/>
    <line class="tick" x1="460" y1="320" x2="460" y2="330"/>
    <line class="tick" x1="520" y1="320" x2="520" y2="330"/>
    <line class="tick" x1="580" y1="320" x2="580" y2="330"/>
    <line class="tick" x1="640" y1="320" x2="640" y2="330"/>
  </g>

  <!-- Sinal contínuo -->
  <path class="signal"
        d="M60 300
           Q180 120 300 200
           Q420 300 540 200
           Q600 160 660 300"/>

  <!-- Amostras -->
  <g>
    <rect class="sample" x="96"  y="255" width="8" height="8"/>
    <rect class="sample" x="156" y="195" width="8" height="8"/>
    <rect class="sample" x="216" y="160" width="8" height="8"/>
    <rect class="sample" x="276" y="180" width="8" height="8"/>
    <rect class="sample" x="336" y="230" width="8" height="8"/>
    <rect class="sample" x="396" y="260" width="8" height="8"/>
    <rect class="sample" x="456" y="220" width="8" height="8"/>
    <rect class="sample" x="516" y="180" width="8" height="8"/>
    <rect class="sample" x="576" y="200" width="8" height="8"/>
    <rect class="sample" x="636" y="265" width="8" height="8"/>
  </g>

  <!-- Rótulo -->
  <text class="label" x="330" y="360">Amostragem</text>

  <!-- ================== ÁREA B: QUANTIZAÇÃO ================== -->
  <!-- Escala de cinza: branco -> preto -->
  <g>
    <rect class="quant" x="740" y="80"  width="80" height="40" fill="#ffffff"/>
    <rect class="quant" x="740" y="120" width="80" height="40" fill="#dddddd"/>
    <rect class="quant" x="740" y="160" width="80" height="40" fill="#bbbbbb"/>
    <rect class="quant" x="740" y="200" width="80" height="40" fill="#999999"/>
    <rect class="quant" x="740" y="240" width="80" height="40" fill="#666666"/>
    <rect class="quant" x="740" y="280" width="80" height="40" fill="#000000"/>
  </g>

  <!-- Marcas laterais -->
  <g>
    <line class="tick" x1="720" y1="80"  x2="740" y2="80"/>
    <line class="tick" x1="720" y1="120" x2="740" y2="120"/>
    <line class="tick" x1="720" y1="160" x2="740" y2="160"/>
    <line class="tick" x1="720" y1="200" x2="740" y2="200"/>
    <line class="tick" x1="720" y1="240" x2="740" y2="240"/>
    <line class="tick" x1="720" y1="280" x2="740" y2="280"/>
    <line class="tick" x1="720" y1="320" x2="740" y2="320"/>
  </g>

  <!-- Texto Quantização -->
  <text class="label"
        x="850" y="210"
        transform="rotate(90 850 210)">
    Quantização
  </text>

</svg>
