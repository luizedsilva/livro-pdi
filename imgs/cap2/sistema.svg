<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <style>
    /* Compatível com Quarto HTML e PDF */
    .box {
      fill: #ffffff;
      stroke: #000000;
      stroke-width: 1.8;
    }
    .title {
      font-family: system-ui, -apple-system, "Segoe UI",
                   "Latin Modern Sans", Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-anchor: middle;
    }
    .text {
      font-family: system-ui, -apple-system, "Segoe UI",
                   "Latin Modern Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 400;
      text-anchor: middle;
    }
    .italic {
      font-style: italic;
    }
    .arrow {
      fill: none;
      stroke: #000000;
      stroke-width: 1.6;
      marker-end: url(#arrowhead);
    }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>

  <!-- Aquisição -->
  <rect class="box" x="40" y="80" width="220" height="160"/>
  <text class="title" x="150" y="55">Aquisição</text>
  <text class="text" x="150" y="125">Câmeras de Vídeo</text>
  <text class="text italic" x="150" y="165">Scanners</text>

  <!-- Processamento -->
  <rect class="box" x="340" y="80" width="220" height="160"/>
  <text class="title" x="450" y="55">Processamento</text>
  <text class="text" x="450" y="155">Computador</text>

  <!-- Saída -->
  <rect class="box" x="640" y="80" width="220" height="160"/>
  <text class="title" x="750" y="55">Saída</text>
  <text class="text" x="750" y="115">Monitores de Vídeo</text>
  <text class="text" x="750" y="155">Impressoras</text>
  <text class="text italic" x="750" y="195">Plotters</text>

  <!-- Armazenamento -->
  <rect class="box" x="340" y="300" width="220" height="170"/>
  <text class="text" x="450" y="330">Discos Ópticos</text>
  <text class="text" x="450" y="360">Discos Magnéticos</text>
  <text class="text" x="450" y="390">Fitas Magnéticas</text>
  <text class="text italic" x="450" y="420">Videotape</text>
  <text class="title" x="450" y="495">Armazenamento</text>

  <!-- Setas -->
  <line class="arrow" x1="260" y1="160" x2="340" y2="160"/>
  <line class="arrow" x1="560" y1="160" x2="640" y2="160"/>
  <line class="arrow" x1="450" y1="240" x2="450" y2="300"/>
  <line class="arrow" x1="450" y1="300" x2="450" y2="240"/>

</svg>
