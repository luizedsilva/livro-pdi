<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="spectralGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6a00ff"/>
      <stop offset="16%"  stop-color="#0000ff"/>
      <stop offset="33%"  stop-color="#00ffff"/>
      <stop offset="50%"  stop-color="#00ff00"/>
      <stop offset="66%"  stop-color="#ffff00"/>
      <stop offset="83%"  stop-color="#ff7f00"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
  </defs>

  <style>
    .title {
      font-family: system-ui, -apple-system, "Segoe UI",
                   "Latin Modern Sans", Helvetica, Arial, sans-serif;
      font-size: 18px;
      font-weight: 600;
      text-anchor: middle;
    }
    .label {
      font-family: system-ui, -apple-system, "Segoe UI",
                   "Latin Modern Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      text-anchor: middle;
    }
    .axis {
      stroke: #000;
      stroke-width: 1.2;
    }
  </style>

  <!-- Título -->
  <text class="title" x="450" y="30">
    Faixa do Espectro Visível da Luz
  </text>

  <!-- Barra do espectro -->
  <rect x="100" y="70" width="700" height="50"
        fill="url(#spectralGradient)" stroke="#000"/>

  <!-- Eixo -->
  <line class="axis" x1="100" y1="140" x2="800" y2="140"/>

  <!-- Marcas e rótulos -->
  <line class="axis" x1="100" y1="135" x2="100" y2="145"/>
  <text class="label" x="100" y="165">400 nm</text>
  <text class="label" x="100" y="185">Violeta</text>

  <line class="axis" x1="275" y1="135" x2="275" y2="145"/>
  <text class="label" x="275" y="165">≈500 nm</text>
  <text class="label" x="275" y="185">Azul</text>

  <line class="axis" x1="450" y1="135" x2="450" y2="145"/>
  <text class="label" x="450" y="165">≈550 nm</text>
  <text class="label" x="450" y="185">Verde</text>

  <line class="axis" x1="625" y1="135" x2="625" y2="145"/>
  <text class="label" x="625" y="165">≈600 nm</text>
  <text class="label" x="625" y="185">Amarelo / Laranja</text>

  <line class="axis" x1="800" y1="135" x2="800" y2="145"/>
  <text class="label" x="800" y="165">700 nm</text>
  <text class="label" x="800" y="185">Vermelho</text>

</svg>
